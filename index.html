<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار التحصيلي الذهبي - الأستاذ إبراهيم الأسمري</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; --dark: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; width: 100%; max-width: 900px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; position: relative; overflow: hidden; }
        .container::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--primary), #60a5fa); }
        .teacher-name { color: var(--danger); font-size: 1.6em; font-weight: bold; display: block; margin-top: 10px; }
        .school-name { color: #64748b; font-size: 1.2em; font-weight: 500; display: block; margin-bottom: 15px; }
        .q-counter { background: var(--dark); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 10px; display: inline-block; }
        .q-drawing-box { background: white; border: 2px solid #e2e8f0; border-radius: 15px; padding: 15px; margin: 15px auto; max-width: 350px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .input-group { margin: 30px auto; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        input[type="text"], select { padding: 18px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 18px; text-align: center; width: 100%; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px 45px; border-radius: 16px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .student-header-info { background: #eff6ff; padding: 10px; border-radius: 12px; margin-bottom: 15px; color: var(--primary); border: 1px solid #dbeafe; display: flex; justify-content: center; gap: 20px; font-weight: bold; }
        #feedback-area { display: none; margin: 15px auto; padding: 15px; border-radius: 15px; max-width: 600px; text-align: right; border-right: 5px solid; }
        .fb-success { background: #dcfce7; border-color: #16a34a; color: #15803d; }
        .fb-danger { background: #fee2e2; border-color: #dc2626; color: #b91c1c; }
        .result-card { background: #f1f5f9; padding: 30px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; border: 6px solid var(--primary); font-size: 22px; font-weight: bold; }
        .progress-bar { width: 100%; height: 12px; background: #e2e8f0; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 1.5s ease; }
        #quiz-screen, #result-screen, #blocked-screen { display: none; }
        .option { background: #f8fafc; padding: 16px; width: 95%; max-width: 550px; border-radius: 15px; cursor: pointer; margin: 10px auto; border: 2px solid #e2e8f0; transition: 0.2s; text-align: right; }
        .correct-opt { background: #dcfce7 !important; border-color: var(--success) !important; color: #16a34a; font-weight: bold; }
        .wrong-opt { background: #fee2e2 !important; border-color: var(--danger) !important; color: #dc2626; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: right; }
        th { background: var(--dark); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="blocked-screen">
        <h1 style="color: var(--danger);">تنبيه ⚠️</h1>
        <p>لقد أديت هذا النموذج مسبقاً.</p>
    </div>

    <div id="start-screen">
        <h1>الاختبار التحصيلي (فيزياء 1) 🚀</h1>
        <span class="teacher-name">الأستاذ: إبراهيم الأسمري</span>
        <span class="school-name">ثانوية الأمير عبدالمجيد بن عبدالعزيز</span>
        <div class="input-group">
            <input type="text" id="student-name" placeholder="الاسم الثلاثي للطالب">
            <input type="text" id="student-class" placeholder="الفصل">
            <select id="model-select">
                <option value="1">نموذج 1 (18 سؤال)</option>
                <option value="2">نموذج 2 (32 سؤال)</option>
            </select>
        </div>
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-screen">
        <div class="student-header-info">
            <span>👤 <span id="quiz-student-name"></span></span>
            <span>📝 نموذج <span id="active-model-num"></span></span>
        </div>
        <div class="q-counter">سؤال رقم: <span id="current-q-num">1</span> من <span id="total-q-num"></span></div>
        <div style="margin-bottom: 10px; font-weight: bold; color: var(--danger);">⏳ المتبقي: <span id="timer">60</span> ثانية</div>
        <h2 id="q-text"></h2>
        <div id="drawing-area" class="q-drawing-box" style="display: none;"></div>
        <div id="options-container"></div>
        <div id="feedback-area">
            <strong id="fb-status"></strong>
            <p id="fb-explanation"></p>
        </div>
        <button id="next-btn" class="btn" style="display:none; margin-top: 10px;" onclick="nextQuestion()">السؤال التالي ➡️</button>
    </div>

    <div id="result-screen">
        <div class="result-card">
            <div class="score-circle"><span id="res-score-num">0</span></div>
            <h3>النتيجة النهائية للطالب: <span id="res-name"></span></h3>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الصحيحة</th></tr></thead>
                <tbody id="summary-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let score = 0, currentIdx = 0, log = [], timerInterval, selectedQuestions = [];

    const SVGs = {
        graph1: `<svg viewBox="0 0 200 150" width="250"><line x1="20" y1="130" x2="180" y2="130" stroke="black" stroke-width="2"/><line x1="20" y1="130" x2="20" y2="10" stroke="black" stroke-width="2"/><path d="M20 130 L160 20" fill="none" stroke="blue" stroke-width="3"/><text x="180" y="145" font-size="12">t(s)</text><text x="5" y="20" font-size="12" writing-mode="tb">d(m)</text></svg>`,
        graph_v_t: `<svg viewBox="0 0 200 150" width="250"><line x1="20" y1="130" x2="180" y2="130" stroke="black" stroke-width="2"/><line x1="20" y1="130" x2="20" y2="10" stroke="black" stroke-width="2"/><path d="M20 130 L60 80 L120 80 L160 130" fill="none" stroke="red" stroke-width="3"/><text x="180" y="145" font-size="12">t</text><text x="5" y="20" font-size="12">v</text></svg>`,
        inclined: `<svg viewBox="0 0 200 120" width="250"><path d="M20 100 L180 100 L180 20 Z" fill="#e2e8f0" stroke="black"/><rect x="80" y="55" width="30" height="20" transform="rotate(-25 95 65)" fill="white" stroke="black"/><line x1="95" y1="55" x2="95" y2="20" stroke="red" stroke-width="2" marker-end="url(#arrow)"/></svg>`
    };

    const model1 = [
        { q: "علم يدرس الطاقة والمادة والعلاقة بينهما:", options: ["علم الكيمياء", "علم الأحياء", "علم الأرض", "علم الفيزياء"], correct: "علم الفيزياء", fb: "الفيزياء هي العلم الأساسي لدراسة المادة والطاقة." },
        { q: "أي صيغ العلاقات التالية تكافئ العلاقة T = V.S / m²؟", options: ["m = TV.S", "m² = T.V.S", "m² = V.S / T", "m = V.S / T"], correct: "m² = V.S / T", fb: "باستخدام الضرب التبادلي لترتيب المعادلة." },
        { q: "تفسير قابل للاختبار:", options: ["الفرضية", "القانون", "المبدأ", "النظرية"], correct: "الفرضية", fb: "الفرضية تخمين علمي يحتاج لتجربة." },
        { q: "لكي تثبت صحة الفرضية نحتاج إلى:", options: ["التجريب", "الملاحظة", "التحليل", "الاستنتاج"], correct: "التجريب", fb: "التجربة هي الفيصل في صحة الفرضيات." },
        { q: "الطاقة لا تفنى ولا تستحدث من العدم، تمثل:", options: ["نظرية", "قانوناً", "استنتاجاً", "فرضية"], correct: "قانوناً", fb: "هذا هو قانون حفظ الطاقة." },
        { q: "مقارنة كمية مجهولة بأخرى معيارية:", options: ["القياس", "الدقة", "الضبط", "الطريقة العلمية"], correct: "القياس", fb: "تعريف القياس الفيزيائي." },
        { q: "دقة قياس الأداة تساوي:", options: ["نصف قيمة أصغر تدريج", "نصف قيمة أكبر تدريج", "قيمة أصغر تدريج", "ضعف التدريج"], correct: "نصف قيمة أصغر تدريج", fb: "قاعدة ثابتة في دقة الأجهزة اليدوية." },
        { q: "إحدى الكميات التالية كمية فيزيائية متجهة:", options: ["الزمن", "الإزاحة", "الكتلة", "المسافة"], correct: "الإزاحة", fb: "الإزاحة تتطلب مقداراً واتجاهاً." },
        { q: "الكميات التالية كميات قياسية ما عدا:", options: ["الزمن", "القوة", "درجة الحرارة", "الحجم"], correct: "القوة", fb: "القوة كمية متجهة." },
        { q: "النظام الدولي يرمز له بالرمز:", options: ["SI", "MI", "TR", "GI"], correct: "SI", fb: "System International." },
        { q: "وحدة الكمية الأساسية في النظام العالمي:", options: ["التسلا", "الفولت", "الأمبير", "الأوم"], correct: "الأمبير", fb: "الأمبير وحدة أساسية لشدة التيار." },
        { q: "أي الكميات التالية كمية مشتقة؟", options: ["شدة التيار", "فرق الجهد", "الزمن", "شدة الإضاءة"], correct: "فرق الجهد", fb: "فرق الجهد يشتق من الشغل والشحنة." },
        { q: "المسافة بين الطائف وجدة 180km، كم تكون بالأمتار؟", options: ["180 × 10³", "1800", "180 × 10⁴", "1.8 × 10⁶"], correct: "180 × 10³", fb: "لتحويل من km إلى m نضرب في 1000." },
        { q: "كم Hz في 0.6 MHz؟", options: ["6 × 10⁵", "6 × 10⁶", "0.6 × 10⁴", "6 × 10³"], correct: "6 × 10⁵", fb: "الميجا تساوي 10⁶، لذا 0.6 × 10⁶ = 6 × 10⁵." },
        { q: "أي القيم تساوي 86.2 cm؟", options: ["0.862 m", "8.62 m", "862 mm", "0.0862 km"], correct: "0.862 m", fb: "نقسم على 100 للتحويل لمتر." }
    ];

    const model2 = [
        { q: "بناءً على مسار الشعاع، ما هي الظاهرة الموضحة؟", options: ["الانعكاس", "الانكسار", "الحيود", "الاستقطاب"], correct: "الحيود", fb: "انحناء الضوء حول الحواف يسمى حيوداً." },
        { q: "الإزاحة تمثل التغير في ........... الجسم في اتجاه معين.", options: ["حركة", "موقع", "سرعة", "تسارع"], correct: "موقع", fb: "الإزاحة هي التغير في الموقع." },
        { q: "من الرسم البياني المجاور، عند الزمن 4s تكون المسافة الفاصلة بين العدائين:", draw: SVGs.graph1, options: ["20m", "45m", "60m", "10m"], correct: "20m", fb: "نطرح موقع العداء الأول من الثاني عند نفس اللحظة." },
        { q: "التغير في الموقع مقسوماً على زمن حدوث التغير:", options: ["الإزاحة", "السرعة المتجهة المتوسطة", "التسارع", "الزخم"], correct: "السرعة المتجهة المتوسطة", fb: "هذا تعريف السرعة V = Δd/Δt." },
        { q: "تسارع جسم تغيرت سرعته بمعدل 30m/s خلال 2s:", options: ["60 m/s²", "15 m/s²", "30 m/s²", "5 m/s²"], correct: "15 m/s²", fb: "a = 30 / 2 = 15." },
        { q: "قذف جسم رأسياً لأعلى، عند أقصى ارتفاع تكون سرعته:", options: ["أقصى ما يمكن", "تساوي تسارع الجاذبية", "صفراً", "تساوي سرعته الابتدائية"], correct: "صفراً", fb: "يتوقف الجسم لحظياً قبل العودة." },
        { q: "سقط جسم من أعلى مبنى وبعد 10s وصل للأرض، سرعته لحظة الاصطدام:", options: ["9.8 m/s", "98 m/s", "980 m/s", "صفر"], correct: "98 m/s", fb: "v = g * t = 9.8 * 10 = 98." },
        { q: "ممانعة الجسم لأي تغيير في حالته تسمى:", options: ["رد الفعل", "الاحتكاك", "القصور الذاتي", "الوزن"], correct: "القصور الذاتي", fb: "قانون نيوتن الأول." },
        { q: "شخص كتلته على الأرض 100kg، كم كتلته على القمر؟", options: ["صفر", "100 kg", "16.6 kg", "980 kg"], correct: "100 kg", fb: "الكتلة ثابتة لا تتغير بتغير المكان." },
        { q: "يمثل السهم رقم 2 في الشكل المجاور قوة:", draw: SVGs.inclined, options: ["الجاذبية", "الاحتكاك", "القوة العمودية", "الشد"], correct: "القوة العمودية", fb: "القوة العمودية تكون دائماً عمودية على سطح التلامس." }
    ];

    function startQuiz() {
        const name = document.getElementById('student-name').value.trim();
        const modelId = document.getElementById('model-select').value;
        if(name.split(" ").length < 3) return alert("يرجى كتابة الاسم الثلاثي.");
        
        document.getElementById('quiz-student-name').innerText = name;
        document.getElementById('active-model-num').innerText = modelId;
        
        selectedQuestions = (modelId === "1") ? [...model1] : [...model2];
        shuffle(selectedQuestions);
        
        document.getElementById('total-q-num').innerText = selectedQuestions.length;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        clearInterval(timerInterval);
        if(currentIdx >= selectedQuestions.length) return finishQuiz();
        
        const q = selectedQuestions[currentIdx];
        document.getElementById('current-q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        
        const drawArea = document.getElementById('drawing-area');
        if(q.draw) { drawArea.innerHTML = q.draw; drawArea.style.display = 'flex'; }
        else { drawArea.style.display = 'none'; }

        let timeLeft = 60; document.getElementById('timer').innerText = timeLeft;
        document.getElementById('feedback-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        let opts = [...q.options]; shuffle(opts);
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        opts.forEach(o => {
            const d = document.createElement('div'); d.className = 'option'; d.innerText = o;
            d.onclick = () => checkAnswer(o, d, q);
            container.appendChild(d);
        });
        timerInterval = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft<=0) checkAnswer(null, null, q); }, 1000);
    }

    function checkAnswer(selected, el, qObj) {
        clearInterval(timerInterval);
        const isCorrect = selected === qObj.correct;
        if(isCorrect) score++;
        log.push({q: qObj.q, user: selected || "انتهى الوقت", correct: qObj.correct, status: isCorrect});
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.style.pointerEvents = 'none';
            if(opt.innerText === qObj.correct) opt.classList.add('correct-opt');
            if(selected && opt.innerText === selected && !isCorrect) opt.classList.add('wrong-opt');
        });
        
        document.getElementById('feedback-area').style.display = 'block';
        document.getElementById('feedback-area').className = isCorrect ? 'fb-success' : 'fb-danger';
        document.getElementById('fb-status').innerText = isCorrect ? "صحيح ✅" : "خطأ ❌";
        document.getElementById('fb-explanation').innerText = "توضيح: " + qObj.fb;
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() { currentIdx++; showQuestion(); }

    function finishQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-name').innerText = document.getElementById('student-name').value;
        document.getElementById('res-score-num').innerText = score + " / " + selectedQuestions.length;
        const perc = (score / selectedQuestions.length) * 100;
        document.getElementById('progress-fill').style.width = perc + "%";
        
        const body = document.getElementById('summary-body');
        log.forEach((l, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${l.q}</td><td style="color:${l.status?'green':'red'}">${l.user}</td><td>${l.correct}</td></tr>`;
        });
    }

    function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }
</script>
</body>
</html>
