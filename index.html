<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الفيزياء - إبراهيم الأسمري</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; }
        .school-info { color: #64748b; font-size: 1.1em; margin-top: 10px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        #quiz-screen, #result-screen { display: none; }
        .timer-box { float: left; background: #fee2e2; color: var(--danger); padding: 10px 20px; border-radius: 50px; font-weight: bold; }
        .q-card { margin-top: 40px; }
        .option { background: #f1f5f9; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .option:hover { background: #e2e8f0; }
        .correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #16a34a; font-weight: bold; }
        .wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #dc2626; font-weight: bold; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; border-right: 5px solid var(--primary); background: #eff6ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <div class="header">
            <h1>اختبار الفيزياء الممتع 🚀</h1>
            <div class="school-info">إعداد الطالب: <b>إبراهيم الأسمري</b></div>
            <div class="school-info">ثانوية الأمير عبدالمجيد - الرياض</div>
        </div>
        <p>أهلاً بك يا بطل! هل أنت مستعد لتحدي قوانين الطبيعة؟</p>
        <input type="text" id="student-name" placeholder="أدخل اسمك الكريم هنا...">
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار الآن</button>
    </div>

    <div id="quiz-screen">
        <div class="timer-box">الوقت المتبقي: <span id="timer">60</span> ثانية</div>
        <div id="display-name" style="font-weight: bold; color: var(--primary);"></div>
        <hr>
        <div class="q-card">
            <h3 id="q-number"></h3>
            <h2 id="q-text"></h2>
            <div id="options-container"></div>
        </div>
        <div id="feedback-box" class="feedback">
            <b id="fb-title"></b>
            <p id="fb-text"></p>
        </div>
        <button id="next-btn" class="btn" style="margin-top:20px; display:none;" onclick="nextQuestion()">السؤال التالي ➡️</button>
    </div>

    <div id="result-screen">
        <h2 id="res-title"></h2>
        <h3 id="res-score"></h3>
        <table>
            <thead>
                <tr>
                    <th>رقم السؤال</th>
                    <th>السؤال</th>
                    <th>إجابتك</th>
                    <th>الإجابة الصحيحة</th>
                    <th>الملاحظة العلمية</th>
                </tr>
            </thead>
            <tbody id="summary-body"></tbody>
        </table>
        <button class="btn" style="margin-top:20px;" onclick="location.reload()">إعادة الاختبار</button>
    </div>
</div>

<script>
    let score = 0;
    let currentIdx = 0;
    let timerInterval;
    let timeLeft = 60;
    let log = [];

    const questions = [
        { q: "ما هي وحدة قياس القوة في النظام الدولي؟", options: ["جول", "نيوتن", "واط", "باسكال"], correct: 1, fb: "النيوتن هو وحدة قياس القوة، وسميت تقديراً للعالم إسحاق نيوتن." },
        { q: "ماذا يحدث لسرعة الجسم إذا كانت القوة المحصلة عليه صفراً؟", options: ["تزداد", "تنقص", "تبقى ثابتة", "يتوقف فوراً"], correct: 2, fb: "حسب قانون نيوتن الأول، يظل الجسم على حالته ما لم تؤثر عليه قوة." },
        { q: "أي الألوان التالية هو الأعلى تردداً في الطيف المرئي؟", options: ["الأحمر", "الأخضر", "الأزرق", "البنفسجي"], correct: 3, fb: "البنفسجي له أقصر طول موجي وأعلى تردد." },
        { q: "ما هي الأداة المستخدمة لقياس التيارات الكهربائية الصغيرة جداً؟", options: ["الفولتمتر", "الجلفانومتر", "الأوميتر", "البارومتر"], correct: 1, fb: "الجلفانومتر جهاز حساس جداً للتيارات الصغيرة." },
        { q: "التسارع هو التغير في ........ مقسوماً على الزمن.", options: ["المسافة", "السرعة المتجهة", "الإزاحة", "الكتلة"], correct: 1, fb: "التسارع يمثل معدل تغير السرعة المتجهة بالنسبة للزمن." },
        { q: "ما هي حالة المادة التي تكون جزيئاتها متلاصقة وتتحرك باهتزاز في مكانها؟", options: ["الغازية", "السائلة", "الصلبة", "البلازما"], correct: 2, fb: "في الحالة الصلبة تكون قوى التماسك كبيرة جداً." },
        { q: "انحناء الضوء عند مروره بحد فاصل بين وسطين مختلفين يسمى:", options: ["الانعكاس", "الانكسار", "الحيود", "الاستقطاب"], correct: 1, fb: "الانكسار يحدث بسبب تغير سرعة الضوء بين الأوساط." },
        { q: "طاقة الحركة تعتمد على الكتلة و ........", options: ["الارتفاع", "الزمن", "مربع السرعة", "درجة الحرارة"], correct: 2, fb: "قانون طاقة الحركة هو $K.E = \frac{1}{2} m v^2$." },
        { q: "صوت الرعد يأتي بعد رؤية البرق لأن:", options: ["البرق أبعد", "سرعة الضوء أكبر من الصوت", "سرعة الصوت أكبر", "الرعد يحدث لاحقاً"], correct: 1, fb: "سرعة الضوء هائلة جداً (300 ألف كم/ث) مقارنة بالصوت (340 م/ث)." },
        { q: "الجهاز الذي يحول الطاقة الميكانيكية إلى طاقة كهربائية:", options: ["المحرك", "المولد", "المصباح", "البطارية"], correct: 1, fb: "المولد الكهربائي (الدينامو) يعمل بمبدأ الحث الكهرومغناطيسي." },
        { q: "المقاومة الكهربائية تقاس بوحدة:", options: ["الأمبير", "الفولت", "الأوم", "الكولوم"], correct: 2, fb: "الأوم هو وحدة المقاومة، وقانون أوم يربطها بالجهد والتيار." },
        { q: "أي موجات تالية لا تحتاج لوسط مادي لانتقالها؟", options: ["الصوت", "موجات الماء", "موجات الراديو", "الزلازل"], correct: 2, fb: "موجات الراديو كهرومغناطيسية تنتقل في الفراغ." },
        { q: "ما هو مقدار ثابت الجاذبية الأرضية تقريباً؟", options: ["9.8 م/ث²", "5.5 م/ث²", "1.6 م/ث²", "12 م/ث²"], correct: 0, fb: "تسارع الجاذبية المعياري هو 9.8 م/ث²." },
        { q: "المرايا التي تستخدم في جوانب السيارات هي مرايا:", options: ["مستوية", "مقعرة", "محدبة", "أسطوانية"], correct: 2, fb: "المرايا المحدبة تعطي مجال رؤية واسعاً للسائق." },
        { q: "ماذا يسمى تحول المادة من الحالة الصلبة إلى الغازية مباشرة؟", options: ["التسامي", "التكثف", "الانصهار", "التجمد"], correct: 0, fb: "التسامي مثل ما يحدث في الجليد الجاف." },
        { q: "الشغل المبذول يساوي القوة مضروبة في:", options: ["الزمن", "الكتلة", "الإزاحة", "السرعة"], correct: 2, fb: "$W = F \cdot d$." },
        { q: "العدسة التي تعالج طول النظر هي العدسة:", options: ["المقعرة", "المحدبة", "المستوية", "الأسطوانية"], correct: 1, fb: "العدسة المحدبة تجمع الأشعة لتسقط على الشبكية." },
        { q: "ما هو الجسيم ذو الشحنة السالبة في الذرة؟", options: ["البروتون", "النيوترون", "الإلكترون", "البوزيترون"], correct: 2, fb: "الإلكترونات تدور حول النواة وشحنتها سالبة." },
        { q: "وحدة قياس القدرة هي:", options: ["النيوتن", "الجول", "الواط", "الهيرتز"], correct: 2, fb: "الواط يساوي جول واحد لكل ثانية." },
        { q: "الموجات الطولية تتكون من تضاغطات و ........", options: ["قمم", "قيعان", "تخلخلات", "انعكاسات"], correct: 2, fb: "مثل موجات الصوت، تتكون من تضاغط وتخلخل." },
        { q: "تزداد مقاومة الموصلات الفلزية بزيادة:", options: ["طول السلك", "مساحة المقطع", "البرودة", "شدة التيار"], correct: 0, fb: "كلما زاد طول السلك زادت التصادمات وبالتالي المقاومة." },
        { q: "قانون الانعكاس يقول أن زاوية السقوط ........ زاوية الانعكاس.", options: ["أكبر من", "أصغر من", "تساوي", "ضعف"], correct: 2, fb: "هذا هو القانون الأول للانعكاس." },
        { q: "درجة الحرارة التي تنعدم عندها طاقة جزيئات المادة هي:", options: ["الصفر المئوي", "الصفر المطلق", "100 مئوية", "الصفر الفهرنهايتي"], correct: 1, fb: "الصفر المطلق (صفر كلفن) هو أقل درجة حرارة ممكنة." },
        { q: "أين تتركز معظم كتلة الذرة؟", options: ["في الإلكترونات", "في النواة", "في الفراغ المحيط", "موزعة بالتساوي"], correct: 1, fb: "النواة تحتوي البروتونات والنيوترونات وهي الأثقل." },
        { q: "ما هو العلم الذي يدرس المادة والطاقة والعلاقة بينهما؟", options: ["الكيمياء", "الأحياء", "الفيزياء", "الجيولوجيا"], correct: 2, fb: "الفيزياء هي أساس العلوم الطبيعية وفهم الكون." }
    ];

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        if(!name.trim()) return alert("لطفاً يا بطل، اكتب اسمك أولاً.");
        document.getElementById('display-name').innerText = "الطالب المبدع: " + name;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        clearInterval(timerInterval);
        if(currentIdx >= questions.length) return finishQuiz();
        
        timeLeft = 60;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('q-number').innerText = `السؤال ${currentIdx + 1} من 25`;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const qData = questions[currentIdx];
        document.getElementById('q-text').innerText = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        qData.options.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(i);
            container.appendChild(btn);
        });

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) handleAnswer(-1);
        }, 1000);
    }

    function handleAnswer(selected) {
        clearInterval(timerInterval);
        const qData = questions[currentIdx];
        const options = document.querySelectorAll('.option');
        const isCorrect = selected === qData.correct;
        const fbBox = document.getElementById('feedback-box');

        if(isCorrect) score++;
        log.push({ 
            q: qData.q, 
            user: selected === -1 ? "انتهى الوقت" : qData.options[selected], 
            correct: qData.options[qData.correct], 
            status: isCorrect,
            fb: qData.fb
        });

        options.forEach((opt, i) => {
            opt.style.pointerEvents = 'none';
            if(i === qData.correct) opt.classList.add('correct');
            else if(i === selected) opt.classList.add('wrong');
        });

        document.getElementById('fb-title').innerText = isCorrect ? "ممتاز! إجابة صحيحة ✅" : "إجابة خاطئة ❌";
        document.getElementById('fb-text').innerText = qData.fb;
        fbBox.style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        showQuestion();
    }

    function finishQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-title').innerText = `نتيجة الطالب: ${document.getElementById('student-name').value}`;
        document.getElementById('res-score').innerText = `لقد حصلت على: ${score} من 25`;
        
        const body = document.getElementById('summary-body');
        body.innerHTML = ""; // مسح المحتوى القديم
        log.forEach((item, index) => {
            body.innerHTML += `
                <tr>
                    <td><b>${index + 1}</b></td>
                    <td>${item.q}</td>
                    <td style="color:${item.status?'#16a34a':'#dc2626'}; font-weight:bold;">${item.user}</td>
                    <td style="color:#16a34a; font-weight:bold;">${item.correct}</td>
                    <td>${item.fb}</td>
                </tr>`;
        });
    }
</script>

</body>
</html>
