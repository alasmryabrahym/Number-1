<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الفيزياء - الأستاذ إبراهيم الأسمري</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; width: 100%; max-width: 800px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .header { margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 2.2em; }
        .teacher-info { color: #dc2626; font-size: 1.2em; margin-top: 10px; display: block; font-weight: bold; }
        .school-info { color: #64748b; font-size: 1.1em; margin-top: 5px; display: block; }
        
        .input-group { margin: 20px auto; max-width: 400px; }
        input[type="text"] { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 18px; text-align: center; box-sizing: border-box; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; display: inline-block; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }
        
        #quiz-screen, #result-screen, #blocked-screen { display: none; }
        .timer-box { display: inline-block; background: #fee2e2; color: var(--danger); padding: 8px 25px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; }
        .option { background: #f8fafc; padding: 18px; width: 90%; max-width: 500px; border-radius: 12px; cursor: pointer; margin: 10px auto; border: 2px solid #e2e8f0; font-size: 17px; }
        .correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #16a34a; }
        .wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #dc2626; }
        .feedback { margin: 20px auto; padding: 15px; border-radius: 12px; display: none; background: #eff6ff; max-width: 600px; border: 1px solid #bfdbfe; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; font-size: 14px; }
        .blocked-msg { color: var(--danger); font-size: 1.5em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="blocked-screen">
        <h1 style="color: var(--danger);">تنبيه! ⚠️</h1>
        <p class="blocked-msg">لقد أتممت هذا الاختبار مسبقاً.</p>
        <p>لا يسمح بالنظام بإعادة المحاولة مرة أخرى.</p>
    </div>

    <div id="start-screen">
        <div class="header">
            <h1>اختبار الفيزياء الممتع 🚀</h1>
            <span class="teacher-info">إعداد الأستاذ: إبراهيم الأسمري</span>
            <span class="school-info">ثانوية الأمير عبدالمجيد - الرياض</span>
        </div>
        <div class="input-group">
            <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي...">
            <input type="text" id="student-class" placeholder="أدخل فصلك (مثال: 3 / 1)">
        </div>
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-screen">
        <div class="timer-box">الوقت المتبقي: <span id="timer">60</span> ثانية</div>
        <div id="student-info-display" style="font-weight: bold; color: var(--primary); margin-bottom: 10px;"></div>
        <div class="q-card">
            <div id="q-number" style="color: #64748b; font-weight: bold;"></div>
            <h2 id="q-text"></h2>
            <div id="options-container"></div>
        </div>
        <div id="feedback-box" class="feedback">
            <h4 id="fb-title" style="margin: 0;"></h4>
            <p id="fb-text" style="margin: 5px 0 0 0;"></p>
        </div>
        <button id="next-btn" class="btn" style="display:none; margin-top: 20px;" onclick="nextQuestion()">السؤال التالي ➡️</button>
    </div>

    <div id="result-screen">
        <h2 id="res-title" style="color: var(--primary);"></h2>
        <h3 id="res-score"></h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>السؤال</th>
                        <th>إجابتك</th>
                        <th>الصحيحة</th>
                    </tr>
                </thead>
                <tbody id="summary-body"></tbody>
            </table>
        </div>
        <p style="margin-top: 25px; color: #64748b; font-weight: bold; font-size: 1.2em;">
            (انتقل للنموذج التالي بارك الله فيك )
        </p>
    </div>
</div>

<script>
    let score = 0;
    let currentIdx = 0;
    let timerInterval;
    let log = [];
    
    // الأسئلة (نفس القائمة السابقة مع تفعيل العشوائية)
    const questionsBase = [
        { q: "ما هي وحدة قياس القوة في النظام الدولي؟", options: ["جول", "نيوتن", "واط", "باسكال"], correct: "نيوتن", fb: "النيوتن هو وحدة قياس القوة." },
        { q: "المقاومة الكهربائية تقاس بوحدة:", options: ["فولت", "أمبير", "أوم", "كولوم"], correct: "أوم", fb: "الأوم يقيس ممانعة الموصل للتيار." },
        { q: "جهاز يستخدم لقياس التيارات الكهربائية الصغيرة جداً:", options: ["الأوميتر", "الجلفانومتر", "الفولتمتر", "البارومتر"], correct: "الجلفانومتر", fb: "الجلفانومتر حساس للتيارات الضئيلة." },
        { q: "السرعة المتجهة تشمل المقدار و ........", options: ["الزمن", "الاتجاه", "الكتلة", "درجة الحرارة"], correct: "الاتجاه", fb: "تتحدد بالمقدار والاتجاه معاً." },
        { q: "طاقة الحركة لجسم تعتمد على كتلته و ........", options: ["ارتفاعه", "حجمه", "مربع سرعته", "لونه"], correct: "مربع سرعته", fb: "تتناسب طردياً مع مربع السرعة." },
        { q: "ما هو تسارع الجاذبية الأرضية التقريبي؟", options: ["5.5 م/ث²", "9.8 م/ث²", "1.6 م/ث²", "12 م/ث²"], correct: "9.8 م/ث²", fb: "9.8 متر لكل ثانية مربعة." },
        { q: "تحول المادة من الحالة الصلبة إلى الغازية مباشرة يسمى:", options: ["التسامي", "الغليان", "التكاثف", "الانصهار"], correct: "التسامي", fb: "التسامي هو تخطي الحالة السائلة." },
        { q: "أي الموجات التالية لا تحتاج لوسط مادي لتنتقل؟", options: ["الصوت", "الماء", "الضوء", "الزلازل"], correct: "الضوء", fb: "الضوء ينتقل في الفراغ." },
        { q: "المرايا التي تعطي صورة مصغرة ومجال رؤية واسع هي:", options: ["المقعرة", "المحدبة", "المستوية", "الأسطوانية"], correct: "المحدبة", fb: "تستخدم في المرايا الجانبية للسيارات." },
        { q: "حالة للمادة تكون جزيئاتها متأينة (إلكترونات وأيونات):", options: ["الصلبة", "السائلة", "الغازية", "البلازما"], correct: "البلازما", fb: "البلازما هي الحالة الرابعة." },
        { q: "انحناء الضوء حول حواف الحاجز يسمى:", options: ["الانكسار", "الحيود", "الانعكاس", "الاستقطاب"], correct: "الحيود", fb: "الحيود ظاهرة موجية عند الحواف." },
        { q: "المعدل الزمني لتغير السرعة المتجهة هو:", options: ["الإزاحة", "التسارع", "الشغل", "القدرة"], correct: "التسارع", fb: "التسارع يعبر عن تغير الحركة." },
        { q: "صوت الرعد يأتي بعد رؤية البرق لأن:", options: ["الرعد أبعد", "الضوء أسرع من الصوت", "الصوت أسرع", "الغيوم تحجب الصوت"], correct: "الضوء أسرع من الصوت", fb: "الضوء 300 ألف كم/ث، الصوت 340 م/ث." },
        { q: "الجهاز الذي يحول الطاقة الحركية إلى كهربائية:", options: ["المحرك", "المولد", "البطارية", "المصباح"], correct: "المولد", fb: "المولد (الدينامو) ينتج كهرباء." },
        { q: "ما هو الجسيم ذو الشحنة الموجبة داخل النواة؟", options: ["الإلكترون", "النيوترون", "البروتون", "الفوتون"], correct: "البروتون", fb: "البروتونات موجبة الشحنة." },
        { q: "العدسة التي تستخدم لتصحيح طول النظر هي:", options: ["المحدبة", "المقعرة", "المستوية", "الأسطوانية"], correct: "المحدبة", fb: "العدسة المحدبة مجمعة." },
        { q: "وحدة قياس الشغل والطاقة هي:", options: ["النيوتن", "الجول", "الواط", "الأمبير"], correct: "الجول", fb: "الجول هو الوحدة الدولية للطاقة." },
        { q: "قانون نيوتن الثالث يقول: لكل فعل رد فعل مساوٍ له في المقدار و ........", options: ["مساوٍ في الاتجاه", "مضاعف له", "معاكس في الاتجاه", "ثابت"], correct: "معاكس في الاتجاه", fb: "الفعل ورد الفعل متضادان اتجاهاً." },
        { q: "تزداد مقاومة السلك الكهربائي إذا زاد ........", options: ["طوله", "سمكه", "برودته", "الجهد"], correct: "طوله", fb: "زيادة طول المسار تزيد المقاومة." },
        { q: "درجة غليان الماء بالسيليزيوس هي:", options: ["0", "32", "100", "273"], correct: "100", fb: "يغلي الماء عند 100 درجة." },
        { q: "المادة التي تسمح بانتقال الشحنات خلالها بسهولة:", options: ["العازل", "الموصل", "شبه الموصل", "الخشب"], correct: "الموصل", fb: "الموصلات تحتوي إلكترونات حرة." },
        { q: "القدرة الكهربائية تقاس بوحدة:", options: ["فولت", "واط", "أوم", "جول"], correct: "واط", fb: "الواط معدل استهلاك الطاقة." },
        { q: "الموجات الطولية تتكون من تضاغطات و ........", options: ["قمم", "قيعان", "تخلخلات", "عقد"], correct: "تخلخلات", fb: "مثل موجات الصوت في الهواء." },
        { q: "ماذا يسمى الاضطراب الذي ينقل الطاقة عبر المادة أو الفراغ؟", options: ["الموجة", "الكتلة", "الجاذبية", "الزمن"], correct: "الموجة", fb: "الموجات تنقل الطاقة لا المادة." },
        { q: "من هو العالم الذي صاغ قانون الجذب العام؟", options: ["أينشتاين", "نيوتن", "أديسون", "تسلا"], correct: "نيوتن", fb: "نيوتن هو مكتشف الجاذبية." }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    window.onload = function() {
        if(localStorage.getItem('quizDone_Ibrahim_Final')) {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('blocked-screen').style.display = 'block';
        }
    };

    function startQuiz() {
        const name = document.getElementById('student-name').value.trim();
        const sClass = document.getElementById('student-class').value.trim();
        
        // شرط الاسم الثلاثي (على الأقل 3 كلمات)
        const nameWords = name.split(/\s+/);
        if(nameWords.length < 3) return alert("الرجاء كتابة الاسم الثلاثي كاملاً.");
        if(!sClass) return alert("الرجاء إدخال الفصل (مثال: 3 / 1).");
        
        shuffle(questionsBase);
        document.getElementById('student-info-display').innerText = `الطالب: ${name} | الفصل: ${sClass}`;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        clearInterval(timerInterval);
        if(currentIdx >= questionsBase.length) return finishQuiz();
        
        let timeLeft = 60;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('q-number').innerText = `سؤال ${currentIdx + 1} من 25`;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const qData = questionsBase[currentIdx];
        document.getElementById('q-text').innerText = qData.q;
        
        let opts = [...qData.options];
        shuffle(opts);
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        opts.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => handleAnswer(opt, div, qData.correct);
            container.appendChild(div);
        });

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) handleAnswer(null, null, qData.correct);
        }, 1000);
    }

    function handleAnswer(selected, element, correct) {
        clearInterval(timerInterval);
        const options = document.querySelectorAll('.option');
        const isCorrect = selected === correct;
        
        log.push({ q: questionsBase[currentIdx].q, user: selected || "تجاوز الوقت", correct: correct, status: isCorrect });
        if(isCorrect) score++;

        options.forEach(opt => {
            opt.style.pointerEvents = 'none';
            if(opt.innerText === correct) opt.classList.add('correct');
            if(selected && opt.innerText === selected && !isCorrect) opt.classList.add('wrong');
        });

        document.getElementById('fb-title').innerText = isCorrect ? "إجابة صحيحة ✅" : "إجابة خاطئة ❌";
        document.getElementById('fb-text').innerText = questionsBase[currentIdx].fb;
        document.getElementById('feedback-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        showQuestion();
    }

    function finishQuiz() {
        localStorage.setItem('quizDone_Ibrahim_Final', 'true');
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-title').innerText = `انتهى الاختبار يا بطل`;
        document.getElementById('res-score').innerText = `نتيجتك النهائية: ${score} من 25`;
        
        const body = document.getElementById('summary-body');
        log.forEach((item, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${item.q}</td><td style="color:${item.status?'green':'red'}">${item.user}</td><td>${item.correct}</td></tr>`;
        });
    }
</script>
</body>
</html>
